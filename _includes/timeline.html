<section class="py-24 bg-background">
  <div class="max-w-4xl mx-auto px-6">

    <h2 class="text-3xl md:text-4xl font-bold text-dark mb-16 text-center">
      Scientific Program
    </h2>

    <div class="relative border-l-4 border-primary pl-10 space-y-14">

      {% for session in site.data.program %}
      <div class="relative group">

        <!-- Timeline Dot -->
        <div class="absolute -left-[11px] top-2 w-5 h-5 bg-primary rounded-full ring-4 ring-background transition group-hover:scale-110"></div>

        <!-- Content -->
        <h3 class="text-lg md:text-xl font-semibold text-dark">
          <span class="text-primary font-bold">
            {{ session.time }}
          </span>
          <span class="mx-2 text-dark/40">–</span>
          {{ session.title }}
        </h3>

        <p class="text-dark/70 mt-2">
          {{ session.speaker }}
        </p>

      </div>
      {% endfor %}

    </div>
  </div>
</section>
