<section class="bg-background lg:grid lg:h-screen lg:place-content-center">
  <div class="mx-auto w-screen max-w-7xl px-4 py-16 sm:px-6 sm:py-24 lg:px-8 lg:py-32">
    <div class="mx-auto max-w-4xl text-center">
      <img src="assets/images/logo_text.svg" alt="DART" class="h-20 sm:h-56 md:h-64 lg:h-72 w-auto align-center">

      <p class="mt-4 text-base text-pretty text-gray-700 sm:text-lg/relaxed">
        {{ include.data.description }}
      </p>

      <div class="mt-4 flex justify-center gap-4 sm:mt-6">
        <a class="inline-block rounded bg-primary px-5 py-3 font-medium text-white shadow-sm transition-colors hover:bg-accent" href="{{ include.data.primary_button.link }}">
          {{ include.data.primary_button.text }}
        </a>

        <a class="inline-block rounded px-5 py-3 bg-primarySoft font-medium text-white shadow-sm transition-colors hover:bg-purple hover:text-white" href="{{ include.data.secondary_button.link }}">
          {{ include.data.secondary_button.text }}
        </a>
      </div>
    </div>
  </div>
</section>
