<section class="relative h-screen flex items-center justify-center text-white overflow-hidden">

  <!-- Background -->
  <div class="absolute inset-0 bg-fixed bg-cover bg-center"
       style="background-image: url('{{ include.image }}')">
  </div>

  <!-- Brand Gradient Overlay -->
  <div class="absolute inset-0 bg-gradient-to-br from-dark/85 via-purple/70 to-dark/90"></div>

  <!-- Content -->
  <div class="relative z-10 text-center px-6 max-w-4xl">

    <h1 class="text-4xl md:text-6xl font-extrabold leading-tight tracking-tight mb-6">
      {{ include.title }}
    </h1>

    <p class="text-lg md:text-xl text-background/90 mb-10">
      {{ include.subtitle }}
    </p>

    <div class="flex justify-center gap-6 flex-wrap">
      <a href="#registration"
         class="bg-primary hover:bg-primarySoft transition px-8 py-4 rounded-xl font-semibold shadow-xl hover:shadow-2xl">
        Register Now
      </a>

      <a href="/program"
         class="border border-background/70 hover:bg-background hover:text-dark transition px-8 py-4 rounded-xl font-semibold">
        View Program
      </a>
    </div>

  </div>
</section>
