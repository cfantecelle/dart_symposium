<div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-lg text-center">
    <h2 class="text-2xl font-bold text-dark sm:text-3xl">Meet our sponsors</h2>

    <p class="mt-4 text-pretty text-gray-700">
      
    </p>
  </div>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 items-center">

    {% for item in site.data.sponsors %}

    <div class="flex items-center justify-center p-4 grayscale hover:grayscale-0 transition">
        <img
        src="{{ item.url }}"
        alt="{{ item.title }}"
        class="max-w-full max-h-20 object-contain"
        >
    </div>

    {% endfor %}

    </div>
</div>
